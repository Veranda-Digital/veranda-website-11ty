<!DOCTYPE html>
<html lang="{{ site.lang }}" class="no-js">
    {% include "partials/head.html" %}

    <body>
        <div class="viewport">
            <main id="contentWrapper" class="min-h-screen">
                <!-- HERO -->
                <section id="hero" class="relative w-full">
                    <div class="bg-slate">
                        <div class="overflow-hidden bg-primary ztablet:rounded-bl-[8em]">
                            <div class="relative">
                                {% include "partials/nav.html" %}

                                <!-- Columns -->
                                <div class="between relative m-auto flex max-w-[120em] flex-col-reverse justify-center ztablet:z-0 ztablet:flex-row ztablet:pb-4">
                                    <!-- Pictures -->
                                    <div style="flex: 1 0 50%" class="t-0 l-0 relative">
                                        <div
                                            class="relative top-[6px] inline-flex max-w-[55em] overflow-hidden rounded-tr-[200px] ztablet:absolute ztablet:w-[60vw] ztablet:rounded-tr-[200px] zdesktop:rounded-tr-[300px] zlgdesktop:rounded-tr-[400px]"
                                        >
                                            <img class="fade-right object-cover opacity-90" src="{{ heroImage | default: '/assets/DreamBox-10.jpg' }}" alt="{{ title }}" />
                                        </div>
                                    </div>

                                    <!-- Text -->
                                    <div
                                        style="flex: 1 0 50%"
                                        class="m-auto w-[86vw] max-w-7xl py-[3em] text-center text-white ztablet:py-[1em] ztablet:pr-16 ztablet:text-left zdesktop:py-[2em] zlgdesktop:py-[6em] zlgdesktop:pl-20"
                                    >
                                        <p
                                            data-aos="fade-up"
                                            data-aos-duration="1000"
                                            data-aos-delay="200"
                                            data-aos-once="true"
                                            class="font-sanm pb-0 text-lg text-brightgreen ztablet:pl-3 ztablet:pb-4"
                                        >
                                            {{ newsType | default: "News" }}
                                        </p>
                                        <h1
                                            data-aos="fade-up"
                                            data-aos-duration="1000"
                                            data-aos-delay="400"
                                            data-aos-once="true"
                                            class="font-sansl text-xxxlg leading-[1.1] tracking-tight ztablet:pb-8 ztablet:text-xxxlg zdesktop:text-xxxxlg"
                                        >
                                            {{ title }}
                                        </h1>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- ARTICLE BODY -->
                <section id="news-article" class="relative w-full">
                    {{ content }}
                </section>

                <!-- UPDATES -->
                <section id="updates" class="relative w-full">{% include "sections/updates-simple.html" %}</section>

                <footer class="bottom">{% include "sections/footer.html" %}</footer>
            </main>
        </div>
    </body>
    <script src="/js/scripts.js"></script>
</html>
